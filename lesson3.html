<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marsya lesson 3</title>
</head>
  <body>
    <h3>Soal 3a</h3>
    <button class="uber-button">
    Request now
</button>

    <h3>Soal 3b</h3>
    <button class="amazon-button">
    Add to Cart
</button>

    <h3>Soal 3c</h3>
    <button class="github-button">
    Sign up
</button>

    <h3>Soal 3d</h3>
    <button class="bootstrap-button">
    Get started
</button>

    <button class="download-button">
    Download
</button>

    <h3>Soal 3e</h3>
    <button class="apply-button">
    Apply on company website
</button>

    <button class="save-button">
    Save
</button>
  
</body>
</html>


  <style>
    .uber-button{
      background:black;
      color:white;
      border:none;
      padding:12px 20px;
      cursor:pointer;
    }

    .uber-button:hover{
     opacity:0.8;
    }

    .amazon-button{
      background:rgb(255,216,20);
      border:none;
      width:200px;
      height:36px;
      border-radius:18px;
      cursor:pointer;
    }

    .amazon-button:hover{
      background:rgb(245,205,3);
    }

    .github-button{
      background:rgb(46,164,79);
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:6px;
      cursor:pointer;
    }

    .github-button:hover{
      box-shadow:0 5px 8px rgba(0,0,0,0.15);
    }

    .bootstrap-button{
      background:rgb(121,82,179);
      color:white;
      border:none;
      padding:12px 20px;
    }

    .bootstrap-button:hover{
      background:rgb(99,60,156);
    }

    .download-button{
      background:white;
      border:1px solid gray;
      padding:12px 20px;
    }

    .download-button:hover{
      background:gray;
      color:white;
    }

    .apply-button{
      background:rgb(10,102,194);
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:20px;
    }

    .apply-button:hover{
      background:rgb(2,70,138);
    }

    .save-button{
      background:white;
      color:rgb(10,102,194);
      border:1px solid rgb(10,102,194);
      padding:12px 20px;
      border-radius:20px;
    }

    .save-button:hover{
      background:rgb(226,240,254);
    }
    
  </style>
