<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marsya lesson 8</title>
  <link rel="stylesheet" href="lesson8.css">
</head>
<body>

  <h3>Soal 8a</h3>
  <input class="block-input" type="text" placeholder="Name">
  
  <input class="block-input" type="text" placeholder="Email">

  <h3>Soal 8b</h3>
  <p class="survey-text">Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
  <button class="survey-btn">Yes</button>
  <button class="survey-btn">No</button>

  <h3>Soal 8c</h3>
  <div class="g-search-basic">
  <img class="g-logo-img" src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
  <input class="g-input-basic" type="text" placeholder="Search Google or type a URL">
</div>

  <h3>Soal 8d</h3>
  <div class="signup-box">
  <input class="half-input" type="text" placeholder="First name">
  <input class="half-input" type="text" placeholder="Last name">
  <input class="full-input" type="text" placeholder="Email">
  <button class="signup-button">Sign Up</button>
</div>

  <h3>Soal 8e</h3>
  <div class="uber-box">
  <h2>Request a ride now</h2>
  <input class="ub-in" type="text" placeholder="Enter pickup location">
  <input class="ub-in" type="text" placeholder="Enter destination">

  <div class="ub-btn-group">
    <button class="btn-black">Request now</button>
    <button class="btn-gray">Schedule for later</button>
  </div>
</div>
</body>
</html>
